{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h4 class="fw-bold mb-4 text-primary">
        <i class="bi bi-pencil-square"></i> Edit Task
      </h4>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Task Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control"
            value="{{ task['title'] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ task['description'] or '' }}</textarea>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Priority</label>
            <select name="priority" class="form-select">
              {% for p in ['High', 'Medium', 'Low'] %}
              <option value="{{ p }}" {% if task['priority']==p %}selected{% endif %}>{{ p }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Status</label>
            <select name="status" class="form-select">
              {% for s in ['Pending', 'In Progress', 'Completed'] %}
              <option value="{{ s }}" {% if task['status']==s %}selected{% endif %}>{{ s }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Due Date</label>
            <input type="date" name="due_date" class="form-control"
              value="{{ task['due_date'] or '' }}">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Save Changes
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
